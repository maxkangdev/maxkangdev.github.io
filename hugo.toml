baseURL = 'https://example.org/'
title = 'My New Hugo Site'
theme = "hugo-theme-m10c"
googleAnalytics = "G-KHH0NVNV32"

defaultContentLanguage = 'ko'
defaultContentLanguageInSubdir = true
[languages]
  [languages.ko]
    contentDir = 'content/ko'
    disabled = false
    languageCode = 'ko-KR'
    languageDirection = 'ltr'
    languageName = 'Korean'
    title = '맥스의 블로그'
    weight = 1

  [languages.en]
    contentDir = 'content/en'
    disabled = false
    languageCode = 'en-US'
    languageDirection = 'ltr'
    languageName = 'English'
    title = "Max's Blog"
    weight = 2

[params.style]
  darkestColor = "#242930"
  darkColor = "#353b43"
  lightColor = "#afbac4"
  lightestColor = "#ffffff"
  primaryColor = "#57cc8a"

[params.style.lightMode]
  darkestColor = "#ffffff"
  darkColor = "#f0f0f0"
  lightColor = "#7c7c7c"
  lightestColor = "#242930"
  primaryColor = "#57cc8a"
